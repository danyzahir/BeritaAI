<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeritaAi - Pendeteksi Fakta & Hoax</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="brand">
                <i data-lucide="shield-check" class="brand-icon"></i>
                <h1>BeritaAi</h1>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span>AI Aktif (Fakta & Hoax)</span>
            </div>
        </header>

        <main id="chat-box">
            <div class="message bot">
                <div class="message-content">
                    Halo! Saya <strong>BeritaAi</strong>. Kirimkan saya berita, link artikel, atau gambar informasi, dan saya akan bantu cek apakah itu <strong>FAKTA</strong> atau <strong>HOAX</strong> beserta buktinya.
                </div>
            </div>
        </main>

        <div id="typing-indicator" class="typing">
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
            Memeriksa fakta...
        </div>

        <div class="input-area">
            <div id="image-preview-container" class="image-preview" style="display: none;">
                <img id="preview-img" src="" alt="Preview">
                <button type="button" id="remove-img-btn"><i data-lucide="x" size="14"></i></button>
            </div>
            <form id="chat-form">
                <label for="image-upload" class="upload-btn" title="Unggah Gambar">
                    <i data-lucide="image" size="20"></i>
                    <input type="file" id="image-upload" accept="image/*" style="display: none;">
                </label>
                <input type="text" id="user-input" placeholder="Ketik berita atau tempelkan link..." autocomplete="off">
                <button type="submit" id="send-btn" disabled>
                    <i data-lucide="send" size="18"></i>
                </button>
            </form>
            <div class="footer-info">
                Powered by Google Gemini 2.5 Flash
            </div>
        </div>
    </div>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
